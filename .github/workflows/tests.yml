name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # a normal (non-editable) install — exactly what a user runs, so CI proves
      # the published package is installable on every supported Python
      - name: Install
        run: python -m pip install ".[ui,dev]"

      - name: Tests
        run: python -m pytest -q

      # the whole point of the fake benchmark: a full experiment with no data download
      - name: Smoke — end-to-end run on the synthetic benchmark
        run: |
          evonas-search --config configs/fake.yaml --out /tmp/smoke.json
          evonas-design --map /tmp/smoke.json --best
